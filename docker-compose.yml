version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/gramalert_db
    depends_on:
      - db

  frontend:
    build: ./Frontend
    ports:
      - "3000:80"

  db:
    image: postgres:14
    environment:
      POSTGRES_DB: gramalert_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
